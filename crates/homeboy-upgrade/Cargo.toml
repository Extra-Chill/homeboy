[package]
name = "homeboy-upgrade"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Upgrade subsystem for homeboy: self-upgrade orchestration, install-method detection, update checks, runner/extension upgrade coordination, and the self-status reporting surface. Depends on homeboy-core; core does not depend on it."
publish = false

[lib]
name = "homeboy_upgrade"
path = "src/lib.rs"

[dependencies]
homeboy-core = { version = "0.1.0", path = "../homeboy-core" }
homeboy-extension = { version = "0.1.0", path = "../homeboy-extension" }
homeboy-product-identity = { version = "0.1.0", path = "../homeboy-product-identity" }
homeboy-error = { version = "0.1.0", path = "../homeboy-error" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
semver = "1.0"
regex = "1.11"
toml = "1.0.3"
reqwest = { version = "0.12", default-features = false, features = ["json", "blocking", "rustls-tls", "socks", "http2", "charset", "system-proxy"] }
zip = "0.6"
which = "6.0"
libc = "0.2"
tempfile = "3.14"

[dev-dependencies]
homeboy-core = { version = "0.1.0", path = "../homeboy-core", features = ["test-support"] }
