[package]
name = "homeboy-stack"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Stack subsystem for homeboy: combined-fixes branches built from a base branch plus cherry-picked PRs (stack specs, sync/apply/rebase, PR metadata, status/inspect, push). Depends on homeboy-core; core does not depend on it."
publish = false

[lib]
name = "homeboy_stack"
path = "src/lib.rs"

[dependencies]
homeboy-core = { version = "0.1.0", path = "../homeboy-core" }
homeboy-error = { version = "0.1.0", path = "../homeboy-error" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[dev-dependencies]
homeboy-core = { version = "0.1.0", path = "../homeboy-core", features = ["test-support"] }
tempfile = "3.14"
